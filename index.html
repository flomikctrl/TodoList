<!doctype html>
<html lang="ru-RU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoList — список задач</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Список задач</h1>
  <p class="subtitle">Управляй своими делами</p>
</header>

<main>
  <!-- Форма добавления задачи -->
  <section class="add-form">
    <h2>Новая задача</h2>
    <div class="form-row">
      <input type="text" id="inputTitle" placeholder="Название задачи" />
      <select id="inputPriority">
        <option value="низкий">Низкий</option>
        <option value="средний" selected>Средний</option>
        <option value="высокий">Высокий</option>
      </select>
      <button id="btnAdd">Добавить</button>
    </div>
    <p class="error-message" id="errorMessage"></p>
  </section>

  <!-- Фильтры -->
  <section class="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="active">Активные</button>
    <button class="filter-btn" data-filter="done">Выполненные</button>
  </section>

  <!-- Счётчик -->
  <p class="counter" id="counter">Задач: 0</p>

  <!-- Список задач -->
  <section class="tasks-list" id="tasksList">
    <p class="empty-text">Задач нет. Добавьте первую!</p>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
